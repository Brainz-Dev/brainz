<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainz-Dev</title>
    <script>
      // Capture the full path + search + hash and redirect to /?r=<encoded>
      // index.html will read this and restore it before React boots.
      var dest = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/?r=' + encodeURIComponent(dest));
    </script>
  </head>
  <body></body>
</html>
