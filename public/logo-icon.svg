<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Circuit-style B skeleton -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Vertical spine -->
    <line x1="17" y1="13" x2="17" y2="51"/>
    <!-- Top horizontal base -->
    <line x1="17" y1="13" x2="32" y2="13"/>
    <!-- Top bump of B -->
    <path d="M32 13 C46 13 46 31 32 31"/>
    <!-- Mid horizontal -->
    <line x1="17" y1="31" x2="32" y2="31"/>
    <!-- Mid to bottom-arm start -->
    <line x1="17" y1="31" x2="35" y2="31"/>
    <!-- Bottom bump of B (slightly wider) -->
    <path d="M35 31 C51 31 51 51 35 51"/>
    <!-- Bottom horizontal cap -->
    <line x1="17" y1="51" x2="35" y2="51"/>
  </g>

  <!-- Primary junction nodes -->
  <circle cx="17" cy="13" r="3.2" fill="white"/>
  <circle cx="32" cy="13" r="2.5" fill="white"/>
  <circle cx="17" cy="31" r="3.2" fill="white"/>
  <circle cx="32" cy="31" r="2.5" fill="white"/>
  <circle cx="17" cy="51" r="3.2" fill="white"/>
  <circle cx="35" cy="51" r="2.5" fill="white"/>

  <!-- Curve peak nodes (softer) -->
  <circle cx="44" cy="22" r="2.2" fill="rgba(255,255,255,0.65)"/>
  <circle cx="48" cy="41" r="2.2" fill="rgba(255,255,255,0.65)"/>

  <!-- Branch circuit traces -->
  <line x1="44" y1="22" x2="53" y2="13" stroke="rgba(255,255,255,0.32)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="53" cy="13" r="1.8" fill="rgba(255,255,255,0.28)"/>

  <line x1="48" y1="41" x2="57" y2="33" stroke="rgba(255,255,255,0.32)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="57" cy="33" r="1.8" fill="rgba(255,255,255,0.28)"/>

  <!-- Tiny dot accent on spine midpoint -->
  <circle cx="17" cy="42" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <line x1="17" y1="42" x2="12" y2="46" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="12" cy="46" r="1.4" fill="rgba(255,255,255,0.2)"/>
</svg>
